name: Label Blog Post by Category

on:
  issues:
    types: [opened]

jobs:
  label_issue:
    # Only run if the issue was created using the 'Blog Post' template
    if: contains(github.event.issue.title, '[POST]')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Extract Category from Issue Body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            // This regex looks for the 'Category' label in the form and grabs the value below it
            const categoryMatch = body.match(/### Category\s*\n\s*(.+)/);
            
            if (categoryMatch && categoryMatch[1]) {
              const category = categoryMatch[1].trim().toLowerCase();
              core.setOutput('category', category);
            }

      - name: Add Label
        if: steps.extract.outputs.category != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['${{ steps.extract.outputs.category }}']
            })
